<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Game Day - FA Training Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css">
  <style>
    /* Mobile-first specific styles para Atleta */
    body { padding-bottom: 80px; }
    .giant-input { 
      width: 100%; font-size: 3rem; text-align: center; 
      padding: 20px; border-radius: var(--border-radius); 
      border: 2px solid #334155; background: #0f172a; 
      color: var(--primary-color); font-family: var(--font-display); 
    }
    .giant-input:focus-visible { outline: none; border-color: var(--primary-color); box-shadow: 0 0 0 4px rgba(250, 204, 21, 0.5); }
    .btn-massive { width: 100%; font-size: 1.5rem; padding: 20px; margin-top: 10px; }
    
    .athlete-card { background: var(--bg-surface); padding: 20px; border-radius: var(--border-radius); margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); }
    .athlete-card h3 { font-size: 2rem; margin-bottom: 5px; }
    
    #workoutExecution { display: none; }
  </style>
</head>
<body>
  <!-- Cabeçalho super minimalista -->
  <nav aria-label="Menu principal">
    <div style="padding: 15px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1);">
      <h2 style="color: var(--primary-color); margin:0; font-size: 1.2rem;">FA GAME DAY</h2>
    </div>
  </nav>

  <main class="container" style="padding: 20px;">
    
    <!-- Tela 1: Login via ID de Treino -->
    <section id="loginSection" aria-label="Buscar Treino pelo ID">
      <h1 style="text-align: center; font-size: 2.5rem; margin-bottom: 10px;">ID DO TREINO</h1>
      <p style="text-align: center; color: var(--text-secondary); margin-bottom: 30px;">Digite o código passado pelo Coach na Lousa.</p>
      
      <input type="number" id="workoutIdInput" class="giant-input" aria-label="Digite o código numérico do treino de hoje" placeholder="000000" inputmode="numeric" pattern="[0-9]*">
      <button id="btnStart" class="btn btn-massive" aria-label="Carregar prescrição do treino">START</button>
      <a href="../../../index.html" style="display:block; text-align:center; color: var(--text-secondary); margin-top: 30px; text-decoration: none; font-size: 1.2rem; padding: 15px;" aria-label="Voltar para a página inicial">Voltar para Início</a>
    </section>

    <!-- Tela 2: Execução do Treino -->
    <section id="workoutExecution" aria-label="Lista de exercícios do treino">
      <header style="margin-bottom: 20px;">
        <h1 id="workoutTitle" style="font-size: 2.5rem; color: white;">Game Day</h1>
        <p style="color: var(--text-secondary); font-size: 1.2rem;">Foco e explosão. Registe as cargas.</p>
      </header>

      <div id="exercisesContainer" role="list">
        <!-- Injetado via JS -->
      </div>

      <button id="btnFinishWorkout" class="btn btn-massive" style="background: var(--accent-green); color: white; border: 2px solid var(--accent-green);" aria-label="Finalizar Treino e enviar dados para Gamificação">FINALIZAR TREINO</button>
    </section>

    <!-- Modal PR (Feedback de Sucesso com Acessibilidade Rigorosa) -->
    <div id="prModal" tabindex="-1" aria-live="assertive" role="alertdialog" aria-modal="true" aria-labelledby="prModalTitle" style="display:none; position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.95); z-index: 100; flex-direction: column; justify-content: center; align-items: center; padding: 20px; text-align: center;">
      <h2 id="prModalTitle" style="font-family: var(--font-display); font-size: 5rem; color: var(--primary-color); margin-bottom: 10px; text-transform: uppercase; text-shadow: 0 0 20px rgba(250, 204, 21, 0.5);">NEW PR!</h2>
      <p id="prMessage" style="font-size: 1.8rem; color: white;">Você bateu seu recorde.</p>
      <button id="btnCloseModal" class="btn btn-massive" style="margin-top: 40px; max-width: 300px; border: 2px solid black;" aria-label="Fechar alerta de novo recorde e continuar treinando">Continuar</button>
    </div>

  </main>

  <script type="module" src="../controllers/AthleteController.js"></script>
</body>
</html>
